pre-commit:
  piped: true
  jobs:
    - name: biome
      glob:
        - "*.ts"
        - "*.tsx"
        - "*.js"
        - "*.jsx"
        - "*.mjs"
        - "*.cjs"
        - "*.json"
        - "*.jsonc"
      exclude:
        - ".claude/**"
      run: bunx biome check {staged_files}

    - name: dprint
      glob:
        - "*.md"
      exclude:
        - ".claude/**"
      run: bunx dprint check {staged_files}

    - name: typecheck
      glob:
        - "*.ts"
        - "*.tsx"
        - "tsconfig.json"
      run: bun run typecheck

    - name: test
      glob:
        - "*.ts"
        - "*.tsx"
        - "package.json"
        - "bun.lock"
      # Prefer the stdd gate when the stdd plugin is installed: it runs the
      # tiered unit suite, honours .stdd-off, and verifies .stdd-integrity.
      # Fall back to plain `bun test` when stdd isn't present. This lets stdd
      # compose with no hand-wiring and no ordering dependency on
      # `lefthook install` (stdd's setup detects this job as already wired).
      run: 'if [ -x ./scripts/stdd-precommit.sh ]; then ./scripts/stdd-precommit.sh; else bun test; fi'

    - name: build
      glob:
        - "src/**/*.ts"
        - "src/**/*.tsx"
        - "src/**/*.json"
        - "package.json"
        - "bun.lock"
        - "tsconfig.json"
      run: bun run build
